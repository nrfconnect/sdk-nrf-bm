# Logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_BM_UARTE=y

# Enabling SoftDevice is not strictly needed, though we are building with SoftDevice boards.
CONFIG_SOFTDEVICE=y

# Clock control
CONFIG_CLOCK_CONTROL=y

# LED libraries
CONFIG_BM_GPIOTE=y

# Button libraries
CONFIG_BM_BUTTONS=y
CONFIG_BM_TIMER=y

# SPI libraries
CONFIG_NRFX_SPIM=y
CONFIG_NRFX_SPIS=y
